        // --- STREAMING_CHUNK: Web Audio Chime Generator ---
        const playChime = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime); 
                gain1.gain.setValueAtTime(0.15, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.3);

                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime); 
                    gain2.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.4);
                }, 150);
            } catch (e) {
                console.log("Audio permission pending click.", e);
            }
        };

        // --- STREAMING_CHUNK: Brand Logo Fallback Component ---

        // --- STREAMING_CHUNK: App Entry Component ---
        function ZeloxCloudApp() {
            const [merchants, setMerchants] = useState(() => {
                const stored = localStorage.getItem("zc_merchants");
                return stored ? JSON.parse(stored) : defaultMerchants;
            });

            const [products, setProducts] = useState(() => {
                const stored = localStorage.getItem("zc_products");
                return stored ? JSON.parse(stored) : defaultProducts;
            });

            const [orders, setOrders] = useState(() => {
                const stored = localStorage.getItem("zc_orders");
                return stored ? JSON.parse(stored) : defaultOrders;
            });

            // Navigation and Auth states
            const [view, setView] = useState('login');
            const [loggedUser, setLoggedUser] = useState(null); 
            const [currentShopId, setCurrentShopId] = useState('tacos-don-julio');
            const [activeMerchantTab, setActiveMerchantTab] = useState('pedidos');
            const [activeAdminTab, setActiveAdminTab] = useState('comercios');

            // Forms inputs
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [loginError, setLoginError] = useState('');
            const [showBlockedScreen, setShowBlockedScreen] = useState(false);
            const [blockedMerchantName, setBlockedMerchantName] = useState('');

            // Super Admin Forms & States
            const [showNewMerchantModal, setShowNewMerchantModal] = useState(false);
            const [newMerchant, setNewMerchant] = useState({
                Nombre: '',
                Contacto: '',
                Telefono: '',
                Categoria: 'Restaurante',
                WhatsApp_Group_ID: '',
                Facebook_Page_ID: '',
                Instagram: '',
                Usuario: '',
                Contrasena: '',
                FotoUrl: ''
            });

            // Merchant Catalog Forms
            const [newProduct, setNewProduct] = useState({
                Nombre_Producto: '',
                Precio: '',
                Descripcion: '',
                Imagen: '🍔'
            });

            // Storefront State
            const [cart, setCart] = useState({});
            const [deliveryAddress, setDeliveryAddress] = useState('');
            const [tipPercent, setTipPercent] = useState(10);
            const [customTip, setCustomTip] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Efectivo');
            const [cashAmount, setCashAmount] = useState('');
            const [orderConfirmedModal, setOrderConfirmedModal] = useState(false);
            const [lastPlacedOrder, setLastPlacedOrder] = useState(null);

            // Webhook feedback Simulation
            const [webhookLog, setWebhookLog] = useState([]);
            const [notificationToast, setNotificationToast] = useState(null);

            // Synchronize State
            useEffect(() => {
                localStorage.setItem("zc_merchants", JSON.stringify(merchants));
            }, [merchants]);

            useEffect(() => {
                localStorage.setItem("zc_products", JSON.stringify(products));
            }, [products]);

            useEffect(() => {
                localStorage.setItem("zc_orders", JSON.stringify(orders));
            }, [orders]);

            // Live synchronization channel (Multitasking bridge)
            useEffect(() => {
                const handleStorageChange = (e) => {
                    if (e.key === "zc_orders") {
                        const updated = JSON.parse(e.newValue);
                        if (updated.length > orders.length) {
                            playChime();
                            showToast("🔔 ¡Se recibió un nuevo pedido en vivo!");
                        }
                        setOrders(updated);
                    }
                    if (e.key === "zc_merchants") {
                        setMerchants(JSON.parse(e.newValue));
                    }
                };
                window.addEventListener("storage", handleStorageChange);
                return () => window.removeEventListener("storage", handleStorageChange);
            }, [orders, merchants]);

            const showToast = (message) => {
                setNotificationToast(message);
                setTimeout(() => setNotificationToast(null), 4000);
            };

            // --- STREAMING_CHUNK: Authentication Engine ---
            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');

                const emailTrim = loginEmail.trim();
                const passTrim = loginPass.trim();

                // 1. Super Admin Auth (Master Credentials)
                if (emailTrim === "juan.guerrero@zeloxcloud.com" && passTrim === "Dfc2016") {
                    const session = { email: emailTrim, role: 'super_admin', merchantId: null };
                    setLoggedUser(session);
                    setView('super_admin');
                    showToast("🔓 Acceso de Super Administrador Concedido");
                    return;
                }

                // 2. Client Merchant Auth
                const foundMerchant = merchants.find(m => m.Usuario === emailTrim && m.Contrasena === passTrim);
                if (foundMerchant) {
                    if (foundMerchant.Estatus === "Suspendido") {
                        setBlockedMerchantName(foundMerchant.Nombre);
                        setShowBlockedScreen(true);
                        return;
                    }
                    const session = { email: emailTrim, role: 'merchant', merchantId: foundMerchant.ID_Comercio };
                    setLoggedUser(session);
                    setView('merchant');
                    setActiveMerchantTab('pedidos');
                    showToast(`💼 Sesión iniciada: ${foundMerchant.Nombre}`);
                    return;
                }

                setLoginError('Credenciales incorrectas o cuenta inexistente. Verifica de nuevo.');
            };

            const handleLogout = () => {
                setLoggedUser(null);
                setView('login');
                setLoginEmail('');
                setLoginPass('');
                setShowBlockedScreen(false);
            };

            // --- STREAMING_CHUNK: Super Admin logic (Remote Provisioning) ---
            const createMerchant = (e) => {
                e.preventDefault();
                if (!newMerchant.Nombre || !newMerchant.Contacto || !newMerchant.Usuario || !newMerchant.Contrasena) {
                    showToast("⚠️ Rellena los campos obligatorios.");
                    return;
                }

                const generatedId = newMerchant.Nombre.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                
                const merchantData = {
                    ...newMerchant,
                    ID_Comercio: generatedId,
                    Estatus: "Al corriente",
                    FotoUrl: newMerchant.FotoUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=600&q=80"
                };

                const updated = [...merchants, merchantData];
                setMerchants(updated);
                localStorage.setItem("zc_merchants", JSON.stringify(updated));

                setShowNewMerchantModal(false);
                setNewMerchant({
                    Nombre: '',
                    Contacto: '',
                    Telefono: '',
                    Categoria: 'Restaurante',
                    WhatsApp_Group_ID: '',
                    Facebook_Page_ID: '',
                    Instagram: '',
                    Usuario: '',
                    Contrasena: '',
                    FotoUrl: ''
                });

                showToast(`🚀 Comercio "${merchantData.Nombre}" registrado con éxito`);
            };

            const toggleMerchantStatus = (id, currentStatus) => {
                const nextStatus = currentStatus === "Al corriente" ? "En gracia" : currentStatus === "En gracia" ? "Suspendido" : "Al corriente";
                const updated = merchants.map(m => m.ID_Comercio === id ? { ...m, Estatus: nextStatus } : m);
                setMerchants(updated);
                localStorage.setItem("zc_merchants", JSON.stringify(updated));
                showToast(`Estatus actualizado a: ${nextStatus}`);
            };

            const deleteMerchant = (id) => {
                if (confirm("¿Estás seguro de eliminar este comercio por completo del sistema?")) {
                    const updated = merchants.filter(m => m.ID_Comercio !== id);
                    setMerchants(updated);
                    localStorage.setItem("zc_merchants", JSON.stringify(updated));
                    showToast("❌ Comercio eliminado.");
                }
            };

            // --- STREAMING_CHUNK: Merchant Catalog Logic ---
            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProduct.Nombre_Producto || !newProduct.Precio) return;

                const product = {
                    ID_Producto: 'p-' + Date.now(),
                    ID_Comercio: loggedUser.merchantId,
                    Nombre_Producto: newProduct.Nombre_Producto,
                    Precio: parseFloat(newProduct.Precio),
                    Descripcion: newProduct.Descripcion,
                    Imagen: newProduct.Imagen
                };

                const updated = [...products, product];
                setProducts(updated);
                localStorage.setItem("zc_products", JSON.stringify(updated));

                setNewProduct({ Nombre_Producto: '', Precio: '', Descripcion: '', Imagen: '🍔' });
                showToast("✅ Producto agregado al catálogo");
            };

            const deleteProduct = (id) => {
                const updated = products.filter(p => p.ID_Producto !== id);
                setProducts(updated);
                localStorage.setItem("zc_products", JSON.stringify(updated));
                showToast("🗑️ Producto removido");
            };

            const advanceOrderState = (orderId) => {
                const updated = orders.map(o => {
                    if (o.ID_Orden === orderId) {
                        const nextState = o.Estado === "Nuevo" ? "En Ruta" : "Entregado";
                        return { ...o, Estado: nextState };
                    }
                    return o;
                });
                setOrders(updated);
                localStorage.setItem("zc_orders", JSON.stringify(updated));
                playChime();
                showToast(`📦 Pedido actualizado`);
            };

            const runAiAdvertising = (merchant) => {
                showToast("🤖 Procesando con IA ZeloxCloud...");
                
                setTimeout(() => {
                    const adCopy = `📢 ¡SÚPER PROMO de ${merchant.Nombre}! 🌟
¿Antojo de algo espectacular? Disfruta nuestro menú premium hoy mismo. 

📍 Haz tu pedido directo con envío a domicilio haciendo clic en el enlace:
🔗 https://zeloxcloud.app/shop/${merchant.ID_Comercio}

📱 Contáctanos al: ${merchant.Telefono}
💡 Automatizado con IA ZeloxCloud para ${merchant.Instagram || 'nuestro canal oficial'}`;

                    alert(`🤖 ZeloxCloud IA Publicitaria:\n\nSu copia promocional automática ha sido generada y enviada a los webhooks activos para distribución de contenidos en redes:\n\n${adCopy}`);
                    
                    const webhookPayload = {
                        action: "AI_Autonomous_Ad",
                        merchantName: merchant.Nombre,
                        merchantId: merchant.ID_Comercio,
                        whatsappGroupId: merchant.WhatsApp_Group_ID,
                        facebookPageId: merchant.Facebook_Page_ID,
                        generatedAd: adCopy,
                        timestamp: new Date().toISOString()
                    };

                    setWebhookLog(prev => [JSON.stringify(webhookPayload, null, 2), ...prev]);
                }, 1000);
            };

            // --- STREAMING_CHUNK: Client Storefront Logic ---
            const addToCart = (prod) => {
                setCart(prev => {
                    const currentQty = prev[prod.ID_Producto]?.qty || 0;
                    return {
                        ...prev,
                        [prod.ID_Producto]: { ...prod, qty: currentQty + 1 }
                    };
                });
            };

            const removeFromCart = (prodId) => {
                setCart(prev => {
                    const copy = { ...prev };
                    if (!copy[prodId]) return prev;
                    if (copy[prodId].qty <= 1) {
                        delete copy[prodId];
                    } else {
                        copy[prodId].qty -= 1;
                    }
                    return copy;
                });
            };

            const cartTotal = Object.values(cart).reduce((sum, item) => sum + (item.Precio * item.qty), 0);
            const deliveryFee = cartTotal > 0 ? 30 : 0;
            const currentTipVal = tipPercent === 'custom' ? parseFloat(customTip || 0) : (cartTotal * tipPercent / 100);
            const finalTotal = cartTotal + deliveryFee + currentTipVal;

            const handlePlaceOrder = (merchant) => {
                if (!deliveryAddress.trim()) {
                    alert("⚠️ Por favor ingrese una dirección de entrega válida.");
                    return;
                }

                if (paymentMethod === "Efectivo") {
                    const cash = parseFloat(cashAmount);
                    if (isNaN(cash) || cash < finalTotal) {
                        alert(`⚠️ Por favor introduce un monto de efectivo válido igual o mayor a $${finalTotal.toFixed(2)} MXN.`);
                        return;
                    }
                }

                const newOrderObj = {
                    ID_Orden: "ORD-" + Math.floor(1000 + Math.random() * 9000),
                    ID_Comercio: merchant.ID_Comercio,
                    Cliente: "Cliente Web Local",
                    Direccion: deliveryAddress,
                    Detalle_Productos: Object.values(cart).map(i => `${i.qty}x ${i.Nombre_Producto}`).join(", "),
                    Total: Math.round(finalTotal),
                    Metodo_Pago: paymentMethod,
                    Cambio: paymentMethod === "Efectivo" ? (parseFloat(cashAmount) - finalTotal) : 0,
                    Propina: Math.round(currentTipVal),
                    Envio: deliveryFee,
                    Estado: "Nuevo",
                    Timestamp: "Justo ahora"
                };

                const updatedOrders = [newOrderObj, ...orders];
                setOrders(updatedOrders);
                localStorage.setItem("zc_orders", JSON.stringify(updatedOrders));
                localStorage.setItem("zc_orders_trigger", Date.now().toString());

                // Simulated webhook triggered on Make for GSheets sync
                const makeWebhookPayload = {
                    event: "new_order",
                    ID_Comercio: merchant.ID_Comercio,
                    Nombre_Comercio: merchant.Nombre,
                    ID_Orden: newOrderObj.ID_Orden,
                    Cliente: newOrderObj.Cliente,
                    Direccion: newOrderObj.Direccion,
                    Detalle_Productos: newOrderObj.Detalle_Productos,
                    Total: newOrderObj.Total,
                    Metodo_Pago: newOrderObj.Metodo_Pago,
                    Cambio: newOrderObj.Cambio,
                    WhatsApp_Group_ID: merchant.WhatsApp_Group_ID,
                    Facebook_Page_ID: merchant.Facebook_Page_ID
                };

                setWebhookLog(prev => [JSON.stringify(makeWebhookPayload, null, 2), ...prev]);

                setLastPlacedOrder(newOrderObj);
                setOrderConfirmedModal(true);
                setCart({}); 
                setDeliveryAddress('');
                setCashAmount('');
            };

            const currentMerchantContext = merchants.find(m => m.ID_Comercio === currentShopId) || merchants[0];

            return (
                <div class="flex flex-col min-h-screen justify-between relative">
                    
                    {notificationToast && (
                        <div class="fixed top-5 right-5 z-50 bg-amber-500 text-slate-950 font-bold px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-bounce border border-yellow-200">
                            <i class="fa-solid fa-bell"></i>
                            <span>{notificationToast}</span>

                                                            <div class="flex justify-between">
                                                                <span class="text-slate-400">Instagram Tag:</span>
                                                                <span class="font-mono text-slate-200">{merchant.Instagram || 'No asignado'}</span>
                                                            </div>
                                                        </div>

                                                        <button 
                                                            onClick={() => runAiAdvertising(merchant)}
                                                            class="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 py-3 rounded-xl font-black transition text-xs shadow-lg hover:opacity-95 flex items-center justify-center gap-2"
                                                        >
                                                            <i class="fa-solid fa-bold"></i> Generar Publicidad IA Autónoma
                                                        </button>
                                                    </div>

                                                    {/* INTEGRATION QR & PUBLIC LINKS */}
                                                    <div class="lg:col-span-2 space-y-6">
                                                        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-6">
                                                            <h3 class="font-bold text-lg text-white border-b border-slate-800 pb-3">Canales de Venta QR y Link Digital</h3>
                                                            
                                                            <div class="flex flex-col md:flex-row gap-6 items-center">
                                                                <div class="bg-white p-4 rounded-2xl w-44 h-44 flex items-center justify-center shadow-xl">
                                                                    <img 
                                                                        src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://zeloxcloud.app/shop/${merchant.ID_Comercio}`} 
                                                                        alt="Menú Digital QR"
                                                                        class="w-36 h-36"
                                                                    />
                                                                </div>
                                                                
                                                                <div class="space-y-4 flex-grow">
                                                                    <div>
                                                                        <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider block mb-1">Enlace Público de Autogestión</span>
                                                                        <div class="flex gap-2">
                                                                            <input 
                                                                                type="text" 
                                                                                value={`https://zeloxcloud.app/shop/${merchant.ID_Comercio}`}
                                                                                readOnly
                                                                                class="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-amber-500 flex-grow focus:outline-none"
                                                                            />
                                                                            <button 
                                                                                onClick={() => {
                                                                                    navigator.clipboard.writeText(`https://zeloxcloud.app/shop/${merchant.ID_Comercio}`);
                                                                                    showToast("📋 Enlace copiado al portapapeles");
                                                                                }}
                                                                                class="bg-slate-850 hover:bg-slate-800 text-slate-300 px-3 rounded-xl border border-slate-800 transition"
                                                                                title="Copiar link"
                                                                            >
                                                                                <i class="fa-solid fa-copy"></i>
                                                                            </button>
                                                                        </div>
                                                                    </div>

                                                                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-xs text-slate-400 leading-relaxed">
                                                                        <p class="font-bold text-slate-200 mb-1"><i class="fa-solid fa-circle-question text-amber-500 mr-1.5"></i>¿Cómo funciona esto?</p>
                                                                        Este código QR y enlace apuntan de manera directa a la interfaz interactiva de pedidos de tu comercio local. Puedes imprimir este QR en tus mesas, empaques o publicarlo en tus redes para recibir compras.
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                </div>
                                            )}

                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* 4. CLIENT PUBLIC MENU & CART STOREFRONT */}
                        {view === 'shop' && (
                            <div>
                                {(() => {
                                    const merchant = merchants.find(m => m.ID_Comercio === currentShopId);
                                    if (!merchant) return <p class="text-center text-slate-500">Comercio inexistente o deshabilitado.</p>;

                                    return (
                                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            
                                            {/* MENÚ DIGITAL CON FOTO DE BANNER */}
                                            <div class="lg:col-span-2 space-y-6">
                                                
                                                {/* PREMIUM HEADER CON FOTO DE BANNER O IMAGEN DEL COMERCIO */}
                                                <div class="relative rounded-2xl overflow-hidden border border-slate-800 h-64 flex flex-col justify-end p-6">
                                                    <img 
                                                        src={merchant.FotoUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1000&q=80"} 
                                                        alt={merchant.Nombre} 
                                                        class="absolute inset-0 w-full h-full object-cover z-0"
                                                        onError={(e) => {
                                                            e.target.onerror = null;
                                                            e.target.src = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1000&q=80";
                                                        }}
                                                    />
                                                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/70 to-transparent z-10"></div>
                                                    
                                                    {/* Brand Header Info */}
                                                    <div class="relative z-20 space-y-2">
                                                        <span class="text-[10px] font-black uppercase tracking-widest bg-amber-500 text-slate-950 px-2.5 py-1 rounded">MENÚ DIGITAL EN VIVO</span>
                                                        <h2 class="text-3xl font-black text-white">{merchant.Nombre}</h2>
                                                        <p class="text-xs text-slate-300">Categoría: <span class="text-amber-500 font-semibold">{merchant.Categoria}</span> | 📞 {merchant.Telefono}</p>
                                                    </div>
                                                </div>

                                                {/* PRODUCTS GRID */}
                                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {products.filter(p => p.ID_Comercio === merchant.ID_Comercio).length === 0 ? (
                                                        <p class="text-slate-500 italic py-8 col-span-2 text-center">Este comercio no tiene productos disponibles en su menú en este momento.</p>
                                                    ) : (
                                                        products.filter(p => p.ID_Comercio === merchant.ID_Comercio).map(p => (
                                                            <div key={p.ID_Producto} class="bg-slate-900/95 backdrop-blur-md p-5 rounded-2xl border border-slate-800/80 hover:border-slate-700/80 transition flex flex-col justify-between h-full relative group">
                                                                <div class="space-y-2">
                                                                    <div class="flex justify-between items-start">
                                                                        <span class="text-3xl bg-slate-950 p-2 rounded-xl border border-slate-800">{p.Imagen}</span>
                                                                        <span class="bg-amber-500/10 text-amber-500 font-extrabold px-3 py-1 rounded-lg text-sm border border-amber-500/20">${p.Precio} MXN</span>
                                                                    </div>
                                                                    <h3 class="font-bold text-white text-base pt-2">{p.Nombre_Producto}</h3>
                                                                    <p class="text-xs text-slate-400 leading-relaxed line-clamp-3">{p.Descripcion || 'Sin descripción del producto'}</p>
                                                                </div>
                                                                
                                                                <button 
                                                                    onClick={() => addToCart(p)}
                                                                    class="w-full mt-4 bg-slate-950 hover:bg-amber-500 text-slate-300 hover:text-slate-950 py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 border border-slate-800 hover:border-amber-500"
                                                                >
                                                                    <i class="fa-solid fa-plus-circle"></i> Agregar al Pedido
                                                                </button>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>

                                            </div>

                                            {/* SIDEBAR SHOPPING CART */}
                                            <div class="space-y-6">
                                                <div class="bg-slate-900/95 backdrop-blur-md p-6 rounded-2xl border border-slate-800 space-y-4 sticky top-24 shadow-2xl">
                                                    <h3 class="font-bold text-lg text-white border-b border-slate-800 pb-3 flex justify-between items-center">
                                                        <span>Resumen de Compra</span>
                                                        <span class="text-xs text-slate-400">({Object.values(cart).reduce((sum, i) => sum + i.qty, 0)} artículos)</span>
                                                    </h3>

                                                    {/* ITEMS LIST */}
                                                    {Object.keys(cart).length === 0 ? (
                                                        <div class="text-center py-8 text-slate-500 space-y-2">
                                                            <i class="fa-solid fa-basket-shopping text-3xl text-slate-700"></i>
                                                            <p class="text-xs italic">El carrito está vacío. Agrega tus antojos favoritos.</p>
                                                        </div>
                                                    ) : (
                                                        <div class="divide-y divide-slate-800 max-h-48 overflow-y-auto pr-1">
                                                            {Object.values(cart).map(item => (
                                                                <div key={item.ID_Producto} class="py-2.5 flex justify-between items-center text-xs">
                                                                    <div>
                                                                        <p class="font-bold text-slate-200">{item.Nombre_Producto}</p>
                                                                        <p class="text-slate-500 text-[10px] mt-0.5">Precio: ${item.Precio} x {item.qty}</p>
                                                                    </div>
                                                                    <div class="flex items-center gap-2">
                                                                        <button onClick={() => removeFromCart(item.ID_Producto)} class="text-slate-500 hover:text-red-400 w-5 h-5 flex items-center justify-center bg-slate-950 border border-slate-800 rounded-lg"><i class="fa-solid fa-minus"></i></button>
                                                                        <span class="font-bold text-slate-200">{item.qty}</span>
                                                                        <button onClick={() => addToCart(item)} class="text-slate-500 hover:text-amber-500 w-5 h-5 flex items-center justify-center bg-slate-950 border border-slate-800 rounded-lg"><i class="fa-solid fa-plus"></i></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {/* CUSTOMER INFO AND VALS */}
                                                    {Object.keys(cart).length > 0 && (
                                                        <div class="space-y-4 pt-3 border-t border-slate-800 text-xs">
                                                            <div>
                                                                <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1.5">Dirección Obligatoria de Envío *</label>
                                                                <input 
                                                                    type="text" 
                                                                    placeholder="Calle, número, colonia o referencias"
                                                                    value={deliveryAddress}
                                                                    onChange={(e) => setDeliveryAddress(e.target.value)}
                                                                    class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2 text-slate-200 placeholder-slate-700 focus:outline-none focus:border-amber-500 text-xs"
                                                                    required
                                                                />
                                                            </div>

                                                            {/* TIP SELECTOR */}
                                                            <div>
                                                                <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1.5">Darle una propina al repartidor</label>
                                                                <div class="grid grid-cols-5 gap-1 text-[10px] font-bold">
                                                                    {[0, 5, 10, 15].map(p => (
                                                                        <button 
                                                                            key={p} 
                                                                            type="button"
                                                                            onClick={() => { setTipPercent(p); setCustomTip(''); }}
                                                                            class={`py-1.5 rounded-lg border transition ${tipPercent === p ? 'bg-amber-500 text-slate-950 border-amber-500' : 'bg-slate-950 text-slate-400 border-slate-850'}`}
                                                                        >
                                                                            {p}%
                                                                        </button>
                                                                    ))}
                                                                    <button 
                                                                        type="button"
                                                                        onClick={() => setTipPercent('custom')}
                                                                        class={`py-1.5 rounded-lg border transition ${tipPercent === 'custom' ? 'bg-amber-500 text-slate-950 border-amber-500' : 'bg-slate-950 text-slate-400 border-slate-850'}`}
                                                                    >
                                                                        Personal.
                                                                    </button>
                                                                </div>
                                                                {tipPercent === 'custom' && (
                                                                    <input 
                                                                        type="number" 
                                                                        placeholder="Monto MXN"
                                                                        value={customTip}
                                                                        onChange={(e) => setCustomTip(e.target.value)}
                                                                        class="w-full mt-2 bg-slate-950 border border-slate-850 rounded-xl px-3 py-1.5 text-slate-200 placeholder-slate-700 text-[11px] focus:outline-none"
                                                                    />
                                                                )}
                                                            </div>

                                                            {/* METHOD PAYMENT */}
                                                            <div>
                                                                <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1.5">Forma de Pago</label>
                                                                <select 
                                                                    value={paymentMethod}
                                                                    onChange={(e) => setPaymentMethod(e.target.value)}
                                                                    class="w-full bg-slate-950 border border-slate-855 rounded-xl px-3 py-2 text-slate-200 focus:outline-none focus:border-amber-500 text-xs"
                                                                >
                                                                    <option value="Efectivo">Efectivo</option>
                                                                    <option value="Tarjeta de Débito/Crédito">Tarjeta de Débito/Crédito</option>
                                                                    <option value="Transferencia SPEI">Transferencia SPEI</option>
                                                                </select>
                                                                {paymentMethod === "Efectivo" && (
                                                                    <input 
                                                                        type="number" 
                                                                        placeholder="¿Con cuánto vas a pagar?"
                                                                        value={cashAmount}
                                                                        onChange={(e) => setCashAmount(e.target.value)}
                                                                        class="w-full mt-2 bg-slate-950 border border-slate-850 rounded-xl px-3 py-1.5 text-slate-200 placeholder-slate-700 text-[11px] focus:outline-none"
                                                                        required
                                                                    />
                                                                )}
                                                            </div>

                                                            {/* TICKET CALCULATOR */}
                                                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-850 space-y-2 font-mono text-[11px] text-slate-400">
                                                                <div class="flex justify-between">
                                                                    <span>Subtotal Productos:</span>
                                                                    <span class="text-slate-200">${cartTotal.toFixed(2)}</span>
                                                                </div>
                                                                <div class="flex justify-between">
                                                                    <span>Costo de Envío:</span>
                                                                    <span class="text-slate-200">${deliveryFee.toFixed(2)}</span>
                                                                </div>
                                                                <div class="flex justify-between">
                                                                    <span>Propina Repartidor:</span>
                                                                    <span class="text-slate-200">${currentTipVal.toFixed(2)}</span>
                                                                </div>
                                                                <div class="flex justify-between border-t border-slate-855 pt-2 font-black text-white text-xs">
                                                                    <span>Total Final:</span>
                                                                    <span class="text-amber-500">${finalTotal.toFixed(2)} MXN</span>
                                                                </div>
                                                            </div>

                                                            <button 
                                                                type="button"
                                                                onClick={() => handlePlaceOrder(merchant)}
                                                                class="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 py-3 rounded-xl font-black transition text-xs shadow-lg hover:opacity-95"
                                                            >
                                                                Confirmar Pedido Digital
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* ORDER CONFIRMED MODAL DETAIL */}
                        {orderConfirmedModal && lastPlacedOrder && (
                            <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
                                <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative animate-scaleUp">
                                    <div class="bg-slate-950/40 p-6 text-center border-b border-slate-850">
                                        <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-3 border border-emerald-500/20 text-3xl">
                                            <i class="fa-solid fa-cloud-arrow-up"></i>
                                        </div>
                                        <h3 class="text-xl font-black text-white">¡Pedido Registrado y Enviado!</h3>
                                        <p class="text-xs text-slate-400 mt-1">El comercio ha sido notificado con sonido de alerta.</p>
                                    </div>
                                    <div class="p-6 space-y-4 text-xs font-mono">
                                        <div class="flex justify-between border-b border-slate-850 pb-2">
                                            <span class="text-slate-400">ID Orden:</span>
                                            <span class="font-bold text-amber-500">{lastPlacedOrder.ID_Orden}</span>
                                        </div>
                                        <div class="flex justify-between border-b border-slate-855 pb-2">
                                            <span class="text-slate-400">Cliente:</span>
                                            <span class="text-slate-200">{lastPlacedOrder.Cliente}</span>
                                        </div>
                                        <div>
                                            <span class="text-slate-400 block mb-1">Dirección de Entrega:</span>
                                            <p class="text-slate-200 leading-relaxed font-sans">{lastPlacedOrder.Direccion}</p>
                                        </div>
                                        <div class="bg-slate-950 p-3 rounded-lg border border-slate-850 space-y-1">
                                            <span class="text-slate-400 block border-b border-slate-850 pb-1 mb-1 font-sans font-bold">Detalle de Compra:</span>
                                            <p class="text-slate-300 font-sans">{lastPlacedOrder.Detalle_Productos}</p>
                                            <p class="text-slate-400 text-[10px] mt-1">Envío: $30.00 | Propina: ${lastPlacedOrder.Propina}.00</p>
                                        </div>
                                        <div class="flex justify-between pt-2 border-t border-slate-850 text-sm font-bold">
                                            <span class="text-slate-200">Total Cobrado:</span>
                                            <span class="text-amber-500">${lastPlacedOrder.Total} MXN</span>
                                        </div>
                                    </div>
                                    <div class="p-6 bg-slate-950/40 border-t border-slate-850">
                                        <button 
                                            onClick={() => setOrderConfirmedModal(false)}
                                            class="w-full bg-slate-800 hover:bg-slate-750 text-slate-300 py-3 rounded-xl font-bold transition text-xs"
                                        >
                                            Aceptar y Continuar Comprando
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer class="bg-slate-950 border-t border-slate-900 py-6 text-center text-xs text-slate-500 relative z-10">
                        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p>© 2026 ZeloxCloud Local Hub. Una solución de automatización inteligente de Grupo DFC.</p>
                            <div class="flex gap-4">
                                <a href="#" class="hover:text-slate-300">Soporte Técnico</a>
                                <a href="#" class="hover:text-slate-300">Términos del SaaS</a>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZeloxCloudApp />);
    </script>
</body>
</html>
