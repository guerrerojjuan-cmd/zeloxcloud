        const transformDriveUrl = (url) => {
            if (!url) return '';
            const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
            const match = url.match(driveRegex);
            if (match && match[1]) {
                return `https://docs.google.com/uc?export=view&id=${match[1]}`;
            }
            const driveIdParam = /[?&]id=([a-zA-Z0-9_-]+)/;
            const matchParam = url.match(driveIdParam);
            if (matchParam && matchParam[1]) {
                return `https://docs.google.com/uc?export=view&id=${matchParam[1]}`;
            }
            return url;
        };

        const playChime = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                gain1.gain.setValueAtTime(0.15, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.3);
            } catch (e) {
                console.log("Audio contextual delay bypass.", e);
            }
        };

                                                                <textarea placeholder="Características..." value={newProduct.Descripcion} onChange={(e) => setNewProduct({...newProduct, Descripcion: e.target.value})} rows="3" className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-200 focus:outline-none focus:border-amber-500 resize-none"></textarea>
                                                            </div>
                                                            <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 py-3 rounded-xl font-black">Registrar en Catálogo</button>
                                                        </form>
                                                    </div>

                                                    {/* --- STREAMING_CHUNK: Rendering products table lists... --- */}
                                                    <div className="lg:col-span-2 space-y-4">
                                                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                                            <h3 className="font-bold text-lg text-white mb-4">Productos en Menú / Catálogo Activo</h3>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                {products.filter(p => p.ID_Comercio === merchant.ID_Comercio).length === 0 ? (
                                                                    <p className="text-slate-500 italic col-span-2 text-center py-6">Catálogo vacío.</p>
                                                                ) : (
                                                                    products.filter(p => p.ID_Comercio === merchant.ID_Comercio).map(p => (
                                                                        <div key={p.ID_Producto} className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between items-start">
                                                                            <div className="flex gap-3">
                                                                                <span className="text-3xl p-2 bg-slate-900 rounded-lg flex items-center justify-center w-14 h-14 overflow-hidden border border-slate-800">
                                                                                    {isEmoji(p.Imagen) ? p.Imagen : <img src={p.Imagen} alt={p.Nombre_Producto} className="w-full h-full object-cover rounded" />}
                                                                                </span>
                                                                                <div>
                                                                                    <h4 className="font-bold text-white text-sm">{p.Nombre_Producto}</h4>
                                                                                    <p className="text-xs text-slate-400 mt-1 line-clamp-2">{p.Descripcion}</p>
                                                                                    <span className="text-xs text-amber-500 font-extrabold block mt-2">${p.Precio} MXN</span>
                                                                                </div>
                                                                            </div>
                                                                            <button onClick={() => deleteProduct(p.ID_Producto)} className="text-slate-650 hover:text-red-400 p-1"><i className="fa-solid fa-trash-can"></i></button>
                                                                        </div>
                                                                    ))
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {/* CONFIGURATION AND MARKETING AI */}
                                            {activeMerchantTab === 'config' && (
                                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4 h-max">
                                                        <div className="w-12 h-12 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center border border-amber-500/20 text-xl"><i className="fa-solid fa-robot"></i></div>
                                                        <h3 className="font-bold text-lg text-white">Marketing Inteligente IA</h3>
                                                        <p className="text-xs text-slate-400 mt-1">Escribe tu idea comercial y selecciona a qué redes deseas enviarla para que ChatGPT genere tu posteo con fotografía publicitaria.</p>
                                                        
                                                        <textarea placeholder="Ej: Hoy 10% de descuento en auditorías contables..." value={promoIdea} onChange={(e) => setPromoIdea(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-200 text-xs focus:outline-none resize-none" rows="3"></textarea>
                                                        
                                                        <div className="space-y-2 text-xs text-slate-300">
                                                            <p className="font-bold text-slate-400 uppercase tracking-wider text-[10px]">Redes de Destino:</p>
                                                            <div className="flex flex-wrap gap-3">
                                                                <label className="flex items-center gap-1.5 cursor-pointer">
                                                                    <input type="checkbox" checked={targetNetworks.facebook} onChange={(e) => setTargetNetworks({...targetNetworks, facebook: e.target.checked})} className="rounded bg-slate-950 border-slate-800 text-amber-500 focus:ring-0" />
                                                                    Facebook
                                                                </label>
                                                                <label className="flex items-center gap-1.5 cursor-pointer">
                                                                    <input type="checkbox" checked={targetNetworks.instagram} onChange={(e) => setTargetNetworks({...targetNetworks, instagram: e.target.checked})} className="rounded bg-slate-950 border-slate-800 text-amber-500 focus:ring-0" />
                                                                    Instagram
                                                                </label>
                                                                <label className="flex items-center gap-1.5 cursor-pointer">
                                                                    <input type="checkbox" checked={targetNetworks.whatsapp} onChange={(e) => setTargetNetworks({...targetNetworks, whatsapp: e.target.checked})} className="rounded bg-slate-950 border-slate-800 text-amber-500 focus:ring-0" />
                                                                    WhatsApp
                                                                </label>
                                                            </div>
                                                        </div>

                                                        <button onClick={() => runAiAdvertising(merchant)} className="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 py-3 rounded-xl font-black text-xs">Publicar Promoción IA</button>
                                                    </div>

                                                    <div className="lg:col-span-2 space-y-6">
                                                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-6">
                                                            <h3 className="font-bold text-lg text-white border-b border-slate-800 pb-3">Código QR & Enlace de Autogestión</h3>
                                                            <div className="flex flex-col md:flex-row gap-6 items-center">
                                                                <div className="bg-white p-4 rounded-2xl w-44 h-44 flex items-center justify-center shadow-xl">
                                                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(getDynamicStoreLink(merchant.ID_Comercio))}`} alt="QR" className="w-36 h-36" />
                                                                </div>
                                                                <div className="space-y-4 flex-grow">
                                                                    <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider block mb-1">Enlace del Menú Digital Público</span>
                                                                    <div className="flex gap-2">
                                                                        <input type="text" value={getDynamicStoreLink(merchant.ID_Comercio)} readOnly className="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-amber-500 flex-grow focus:outline-none" />
                                                                        <button onClick={() => { navigator.clipboard.writeText(getDynamicStoreLink(merchant.ID_Comercio)); showToast("📋 Enlace copiado"); }} className="bg-slate-850 hover:bg-slate-800 text-slate-300 px-3 rounded-xl border border-slate-805"><i className="fa-solid fa-copy"></i></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* --- STREAMING_CHUNK: Public digital storefront rendering... --- */}
                        {view === 'shop' && (
                            <div>
                                {(() => {
                                    const merchant = merchants.find(m => m.ID_Comercio === currentShopId);
                                    if (!merchant) return <p className="text-center text-slate-500">Comercio deshabilitado.</p>;
                                    return (
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            <div className="lg:col-span-2 space-y-6">
                                                <div className="relative rounded-2xl overflow-hidden border border-slate-800 h-64 flex flex-col justify-end p-6">
                                                    <img src={transformDriveUrl(merchant.FotoUrl)} alt={merchant.Nombre} className="absolute inset-0 w-full h-full object-cover z-0" onError={(e) => { e.target.onerror = null; e.target.src = "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1000&q=80"; }} />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 to-transparent z-10"></div>
                                                    <div className="relative z-20 space-y-2">
                                                        <span className="text-[10px] font-black uppercase tracking-widest bg-amber-500 text-slate-950 px-2.5 py-1 rounded">MENÚ DIGITAL EN VIVO</span>
                                                        <h2 className="text-3xl font-black text-white">{merchant.Nombre}</h2>
                                                        <p className="text-xs text-slate-300">📞 {merchant.Telefono}</p>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {products.filter(p => p.ID_Comercio === merchant.ID_Comercio).length === 0 ? (
                                                        <p className="text-slate-500 italic py-8 col-span-2 text-center">Catálogo sin productos temporalmente.</p>
                                                    ) : (
                                                        products.filter(p => p.ID_Comercio === merchant.ID_Comercio).map(p => (
                                                            <div key={p.ID_Producto} className="bg-slate-900/95 border border-slate-800/80 p-5 rounded-2xl hover:border-slate-700/80 transition flex flex-col justify-between">
                                                                <div className="space-y-2">
                                                                    <div className="flex justify-between items-start">
                                                                        {/* Dynamically checks if image is custom photo or emoji icon */}
                                                                        <span className="text-3xl bg-slate-950 p-2 rounded-xl border border-slate-800 flex items-center justify-center w-14 h-14 overflow-hidden">
                                                                            {isEmoji(p.Imagen) ? p.Imagen : <img src={p.Imagen} alt={p.Nombre_Producto} className="w-full h-full object-cover rounded" />}
                                                                        </span>
                                                                        <span className="bg-amber-500/10 text-amber-500 font-extrabold px-3 py-1 rounded-lg text-sm border border-amber-500/20">${p.Precio} MXN</span>
                                                                    </div>
                                                                    <h3 className="font-bold text-white text-base pt-2">{p.Nombre_Producto}</h3>
                                                                    <p className="text-xs text-slate-400 line-clamp-3">{p.Descripcion}</p>
                                                                </div>
                                                                <button onClick={() => addToCart(p)} className="w-full mt-4 bg-slate-950 text-slate-300 hover:bg-amber-500 hover:text-slate-950 py-2 rounded-xl text-xs font-bold border border-slate-800 transition">Agregar al Pedido</button>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>

                                            {/* Shopping Cart Side panel */}
                                            <div className="space-y-6">
                                                <div className="bg-slate-900/95 p-6 rounded-2xl border border-slate-800 space-y-4 sticky top-24 shadow-2xl">
                                                    <h3 className="font-bold text-lg text-white border-b border-slate-800 pb-3 flex justify-between items-center">
                                                        <span>Resumen de Compra</span>
                                                        <span className="text-xs text-slate-400">({Object.values(cart).reduce((sum, i) => sum + i.qty, 0)} items)</span>
                                                    </h3>

                                                    {Object.keys(cart).length === 0 ? (
                                                        <p className="text-xs italic text-slate-500 text-center py-6">Carrito vacío.</p>
                                                    ) : (
                                                        <div className="divide-y divide-slate-800 max-h-48 overflow-y-auto pr-1">
                                                            {Object.values(cart).map(item => (
                                                                <div key={item.ID_Producto} className="py-2.5 flex justify-between items-center text-xs">
                                                                    <div>
                                                                        <p className="font-bold text-slate-200">{item.Nombre_Producto}</p>
                                                                        <p className="text-slate-500 text-[10px]">${item.Precio} x {item.qty}</p>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <button onClick={() => removeFromCart(item.ID_Producto)} className="text-slate-550 bg-slate-950 border border-slate-800 rounded p-1"><i className="fa-solid fa-minus"></i></button>
                                                                        <span className="font-bold text-slate-200">{item.qty}</span>
                                                                        <button onClick={() => addToCart(item)} className="text-slate-550 bg-slate-950 border border-slate-800 rounded p-1"><i className="fa-solid fa-plus"></i></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {Object.keys(cart).length > 0 && (
                                                        <div className="space-y-4 pt-3 border-t border-slate-800 text-xs">
                                                            <div>
                                                                <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Dirección de Envío *</label>
                                                                <input type="text" placeholder="Calle, Número, Colonia" value={deliveryAddress} onChange={(e) => setDeliveryAddress(e.target.value)} className="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2 text-slate-200 focus:outline-none focus:border-amber-500 text-xs" required />
                                                            </div>
                                                            <div>
                                                                <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Propina Repartidor</label>
                                                                <div className="grid grid-cols-4 gap-1">
                                                                    {[0, 5, 10, 15].map(p => (
                                                                        <button key={p} type="button" onClick={() => { setTipPercent(p); setCustomTip(''); }} className={`py-1 rounded border transition ${tipPercent === p ? 'bg-amber-500 text-slate-950' : 'bg-slate-950 text-slate-400 border-slate-850'}`}>{p}%</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            <div>
                                                                <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Forma de Pago</label>
                                                                <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className="w-full bg-slate-950 border border-slate-855 rounded-xl px-3 py-2 text-slate-200 focus:outline-none focus:border-amber-500 text-xs cursor-pointer">
                                                                    <option value="Efectivo">Efectivo</option>
                                                                    <option value="Tarjeta de Débito/Crédito">Tarjeta de Débito/Crédito</option>
                                                                    <option value="Transferencia SPEI">Transferencia SPEI</option>
                                                                </select>
                                                                {paymentMethod === "Efectivo" && (
                                                                    <input type="number" placeholder="¿Con cuánto vas a pagar?" value={cashAmount} onChange={(e) => setCashAmount(e.target.value)} className="w-full mt-2 bg-slate-950 border border-slate-850 rounded-xl px-3 py-1.5 text-slate-200 text-xs focus:outline-none" required />
                                                                )}
                                                            </div>

                                                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-850 space-y-2 font-mono text-[11px] text-slate-400">
                                                                <div className="flex justify-between"><span>Subtotal:</span><span>${cartTotal.toFixed(2)}</span></div>
                                                                <div className="flex justify-between"><span>Envío:</span><span>${deliveryFee.toFixed(2)}</span></div>
                                                                <div className="flex justify-between"><span>Propina:</span><span>${currentTipVal.toFixed(2)}</span></div>
                                                                <div className="flex justify-between border-t border-slate-855 pt-2 font-bold text-white text-xs"><span>Total:</span><span className="text-amber-500">${finalTotal.toFixed(2)} MXN</span></div>
                                                            </div>

                                                            <button type="button" onClick={() => handlePlaceOrder(merchant)} className="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 py-3 rounded-xl font-black">Confirmar Pedido Digital</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* --- STREAMING_CHUNK: Success dialog configuration... --- */}
                        {orderConfirmedModal && lastPlacedOrder && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="bg-slate-950/40 p-6 text-center border-b border-slate-850">
                                        <div className="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl"><i className="fa-solid fa-circle-check"></i></div>
                                        <h3 className="text-xl font-black text-white">¡Pedido Enviado!</h3>
                                    </div>
                                    <div className="p-6 space-y-4 text-xs font-mono">
                                        <div className="flex justify-between"><span>ID Orden:</span><span className="font-bold text-amber-500">{lastPlacedOrder.ID_Orden}</span></div>
                                        <div className="flex justify-between"><span>Total:</span><span className="text-slate-200">${lastPlacedOrder.Total} MXN</span></div>
                                    </div>
                                    <div className="p-6 bg-slate-950/40 border-t border-slate-850">
                                        <button onClick={() => setOrderConfirmedModal(false)} className="w-full bg-slate-800 text-slate-300 py-3 rounded-xl font-bold">Aceptar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* UI Custom Dialog (Alert Modals overriding window.alert) */}
                        {customAlert.show && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="p-6 border-b border-slate-800 bg-slate-950/40 flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-amber-500/10 text-amber-500 flex items-center justify-center border border-amber-500/20 text-lg">
                                            <i className="fa-solid fa-circle-info"></i>
                                        </div>
                                        <h3 className="font-black text-base text-white">{customAlert.title}</h3>
                                    </div>
                                    <div className="p-6">
                                        <p className="text-slate-300 text-sm leading-relaxed">{customAlert.message}</p>
                                    </div>
                                    <div className="p-6 bg-slate-950/40 border-t border-slate-800 text-right">
                                        <button 
                                            onClick={() => setCustomAlert({ show: false, title: '', message: '' })}
                                            className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-extrabold px-6 py-2 rounded-xl text-xs transition shadow"
                                        >
                                            Entendido
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* UI Custom Confirm (Modals overriding window.confirm) */}
                        {customConfirm.show && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="p-6 border-b border-slate-800 bg-slate-950/40 flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-red-500/10 text-red-400 flex items-center justify-center border border-red-500/20 text-lg">
                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                        </div>
                                        <h3 className="font-black text-base text-white">{customConfirm.title}</h3>
                                    </div>
                                    <div className="p-6">
                                        <p className="text-slate-300 text-sm leading-relaxed">{customConfirm.message}</p>
                                    </div>
                                    <div className="p-6 bg-slate-950/40 border-t border-slate-800 flex justify-end gap-3 text-right">
                                        <button 
                                            onClick={() => setCustomConfirm({ show: false, title: '', message: '', onConfirm: null })}
                                            className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-5 py-2 rounded-xl text-xs transition"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={() => {
                                                if (customConfirm.onConfirm) customConfirm.onConfirm();
                                                setCustomConfirm({ show: false, title: '', message: '', onConfirm: null });
                                            }}
                                            className="bg-red-500 hover:bg-red-600 text-white font-extrabold px-6 py-2 rounded-xl text-xs transition shadow"
                                        >
                                            Confirmar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Master Footer */}
                    <footer className="bg-slate-950 border-t border-slate-900 py-6 text-center text-xs text-slate-500 relative z-10">
                        <p>© 2026 ZeloxCloud Local Hub. Una solución de automatización inteligente de Grupo DFC.</p>
                    </footer>
                </div>
            );
        }

        // --- STREAMING_CHUNK: Bootstrapping react on root node... ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZeloxCloudApp />);
    </script>
</body>
</html>
