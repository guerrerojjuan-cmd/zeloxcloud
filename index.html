        const transformDriveUrl = (url) => {
            if (typeof url !== 'string' || !url) return '';
            const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
            const match = url.match(driveRegex);
            if (match && match[1]) {
                return `https://docs.google.com/uc?export=view&id=${match[1]}`;
            }
            const driveIdParam = /[?&]id=([a-zA-Z0-9_-]+)/;
            const matchParam = url.match(driveIdParam);
            if (matchParam && matchParam[1]) {
                return `https://docs.google.com/uc?export=view&id=${matchParam[1]}`;

            return url;

        const playChime = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, ctx.currentTime);
                gain1.gain.setValueAtTime(0.15, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.3);
            } catch (e) {
                console.log("AudioContext waiting user gesture.");
            }
        };

            // --- STREAMING_CHUNK: Setup Server-Sent Events (SSE) for Real-Time synchronization... ---
            useEffect(() => {
                const eventSource = new EventSource(`https://ntfy.sh/${NTFY_TOPIC}/sse`);
                
                eventSource.onmessage = (event) => {
                    try {
                        const ntfyData = JSON.parse(event.data);
                        if (ntfyData.message) {
                            const payload = JSON.parse(ntfyData.message);
                            
                            // Scenario 1: Real-time order status update for Consumer tracking
                            if (payload && payload.event === "order_status_updated") {
                                setOrders(prev => prev.map(o => o.ID_Orden === payload.ID_Orden ? { ...o, Estado: payload.Estado } : o));
                                
                                if (activeOrderIdRef.current === payload.ID_Orden) {

                                            return { ...prev, Estado: payload.Estado };

                                        showToast("✅ ¡Tu pedido ha sido entregado! ¡Disfrútalo!");
                                    }

                            }

                            else if (payload && payload.ID_Orden) {
                                setOrders(prev => {
                                    if (prev.some(o => o.ID_Orden === payload.ID_Orden)) return prev;
                                    playChime();
                                    showToast(`🔔 ¡Nuevo pedido recibido en vivo! ID: ${payload.ID_Orden}`);
                                    return [payload, ...prev];
                                });
                            }
                        }
                    } catch (e) {
                        // Keep-alive silence
                    }

                return () => eventSource.close();

            const triggerWebhook = async (payload) => {
                if (!webhookUrl) {
                    console.log("No Webhook URL configured. Simulated Payload:", payload);
                    return;
                }
                try {
                    await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    showToast("📤 Sincronizado con Make.com");
                } catch (e) {
                    console.error("Webhook trigger failed", e);
                }

            const handleImageBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(file);
                });
            };

                        };

            const toggleMerchantStatus = (id, currentStatus) => {

            // --- STREAMING_CHUNK: Status update broadcast over ntfy and webhook... ---
            const advanceOrderState = async (orderId) => {

                    if (o.ID_Orden === orderId) {

                            event: "order_status_updated",

                            Estado: nextState

                    console.error("Failed to broadcast order status", e);

                // Push to webhook
                const syncLog = {

                    Estado: nextState,
                    timestamp: new Date().toISOString()

            const removeFromCart = (prodId) => {
                setCart(prev => {
                    const copy = { ...prev };
                    if (!copy[prodId]) return prev;
                    if (copy[prodId].qty <= 1) delete copy[prodId];
                    else copy[prodId].qty -= 1;
                    return copy;
                });
            };

            const cartTotal = Object.values(cart).reduce((sum, item) => sum + (item.Precio * item.qty), 0);
            const deliveryFee = cartTotal > 0 ? 30 : 0;
            const currentTipVal = tipPercent === 'custom' ? parseFloat(customTip || 0) : (cartTotal * tipPercent / 100);
            const finalTotal = cartTotal + deliveryFee + currentTipVal;

            // --- STREAMING_CHUNK: Handle Placement of persistent Uber/Didi styled order... ---
            const handlePlaceOrder = async (merchant) => {
                if (merchant.Estado_Tienda === "Cerrado") {

                if (paymentMethod === "Efectivo") {

                            show: true,

                        });
                        return;

                const fullAddressString = `${consumerProfile.calle} #${consumerProfile.numero}, Col. ${consumerProfile.colonia}, ${consumerProfile.municipio}`;

                const orderObj = {
                    ID_Orden: "ORD-" + Math.floor(1000 + Math.random() * 9000),
                    ID_Comercio: merchant.ID_Comercio,
                    Cliente: consumerProfile.nombre,
                    Direccion: fullAddressString,
                    Telefono: consumerProfile.telefono,
                    Detalle_Productos: Object.values(cart).map(i => `${i.qty}x ${i.Nombre_Producto}`).join(", "),
                    Total: Math.round(finalTotal),
                    Metodo_Pago: paymentMethod,
                    Cambio: paymentMethod === "Efectivo" ? (parseFloat(cashAmount) - finalTotal) : 0,
                    Propina: Math.round(currentTipVal),
                    Envio: deliveryFee,
                    Estado: "Nuevo",
                    Timestamp: new Date().toLocaleString()
                };

                try {
                    await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
                        method: 'POST',
                        body: JSON.stringify(orderObj)
                    });
                } catch (e) {
                    console.error("Transmission over ntfy failed", e);
                }

                const updatedOrders = [orderObj, ...orders];
                setOrders(updatedOrders);

                const makePayload = {
                    event: "new_order",
                    ID_Comercio: merchant.ID_Comercio,
                    Nombre_Comercio: merchant.Nombre,
                    ID_Orden: orderObj.ID_Orden,
                    Cliente: orderObj.Cliente,
                    Direccion: orderObj.Direccion,
                    Telefono: orderObj.Telefono,
                    Detalle_Productos: orderObj.Detalle_Productos,
                    Total: orderObj.Total,
                    Metodo_Pago: orderObj.Metodo_Pago,
                    Cambio: orderObj.Cambio,
                    WhatsApp_Group_ID: merchant.WhatsApp_Group_ID,
                    Facebook_Page_ID: merchant.Facebook_Page_ID
                };
                setWebhookLog(prev => [JSON.stringify(makePayload, null, 2), ...prev]);
                triggerWebhook(makePayload);

                setLastPlacedOrder(orderObj);
                setActiveOrder(orderObj); // Store active tracking order for the customer
                setOrderConfirmedModal(true);
                setCart({});
                setCashAmount('');
            };

            // Handle Consumer onboarding form submit
            const handleConsumerOnboarding = (e) => {
                e.preventDefault();
                const { nombre, telefono, calle, numero, colonia, municipio } = onboardingForm;
                if (!nombre.trim() || !telefono.trim() || !calle.trim() || !numero.trim() || !colonia.trim() || !municipio.trim()) {
                    setCustomAlert({
                        show: true,

                if (telefono.trim().length < 10) {
                    setCustomAlert({
                        show: true,
                        title: 'Teléfono Inválido',

                    return;

                const profileObj = {

                    telefono: telefono.trim(),

                };

            const runAiAdvertising = (merchant) => {
                if (!promoIdea.trim()) {
                    setCustomAlert({
                        show: true,
                        title: 'Idea de Promoción Vacía',

                    return;
                }
                const selectedChs = Object.keys(targetNetworks).filter(k => targetNetworks[k]);
                const link = getDynamicStoreLink(merchant.ID_Comercio);

                const payloadLog = {
                    action: "AI_Autonomous_Ad",
                    merchantId: merchant.ID_Comercio,
                    merchantName: merchant.Nombre,
                    ideaCaptured: promoIdea,
                    socialNetworksSelected: selectedChs,
                    whatsappGroupId: merchant.WhatsApp_Group_ID,
                    facebookPageId: merchant.Facebook_Page_ID,
                    promptInstructionsChatGPT: `Redacta una campaña publicitaria de alta conversión para las redes: ${selectedChs.join(", ")}. Adicionalmente, incluye las instrucciones para generar una fotografía publicitaria profesional para esta promoción: "${promoIdea}". Asegúrate de incorporar el enlace del comercio: ${link}`,
                    timestamp: new Date().toISOString()
                };

                setWebhookLog(prev => [JSON.stringify(payloadLog, null, 2), ...prev]);
                triggerWebhook(payloadLog);

                setCustomAlert({
                    show: true,
                    title: '🤖 Campaña Transmitida',
                    message: `La propuesta para crear publicidad con imagen en ${selectedChs.join(", ")} fue despachada con éxito al webhook de Make para el procesamiento inteligente.`
                });
            };

            const filteredOrders = orders.filter(o => {
                const matchMerchant = filterMerchant === 'todos' || o.ID_Comercio === filterMerchant;
                const matchPayment = filterPayment === 'todos' || o.Metodo_Pago === filterPayment;
                return matchMerchant && matchPayment;
            });

            // Financial stats calculations
            const getFinancialStats = (merchantOrders) => {
                const now = new Date();
                const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const startOfWeek = now.getTime() - (7 * 24 * 60 * 60 * 1000);
                const startOfMonth = now.getTime() - (30 * 24 * 60 * 60 * 1000);
                
                let totalHoy = 0, totalSemana = 0, totalMes = 0;
                let countHoy = 0, countSemana = 0, countMes = 0;
                
                let pagoEfectivo = 0, pagoTarjeta = 0, pagoSPEI = 0;
                let totalEfectivo = 0, totalTarjeta = 0, totalSPEI = 0;

                merchantOrders.forEach(o => {
                    let orderTime = Date.parse(o.Timestamp);
                    if (isNaN(orderTime)) {
                        const parts = o.Timestamp.split(/[\/\s,:]+/);
                        if (parts.length >= 3) {
                            const day = parseInt(parts[0], 10);
                            const month = parseInt(parts[1], 10) - 1;
                            const year = parseInt(parts[2], 10);
                            const hour = parts[3] ? parseInt(parts[3], 10) : 0;
                            const minute = parts[4] ? parseInt(parts[4], 10) : 0;
                            const dateObj = new Date(year, month, day, hour, minute);
                            orderTime = dateObj.getTime();
                        } else {
                            orderTime = now.getTime();
                        }
                    }

                    const total = parseFloat(o.Total) || 0;

                    if (orderTime >= startOfDay) {
                        totalHoy += total;
                        countHoy++;
                    }
                    if (orderTime >= startOfWeek) {
                        totalSemana += total;
                        countSemana++;
                    }
                    if (orderTime >= startOfMonth) {
                        totalMes += total;
                        countMes++;
                    }

                    const method = o.Metodo_Pago || "Efectivo";
                    if (method.toLowerCase().includes("efectivo")) {
                        pagoEfectivo++;
                        totalEfectivo += total;
                    } else if (method.toLowerCase().includes("tarjeta")) {
                        pagoTarjeta++;
                        totalTarjeta += total;
                    } else {
                        pagoSPEI++;
                        totalSPEI += total;
                    }
                });

                return {
                    hoy: { total: totalHoy, count: countHoy },
                    semana: { total: totalSemana, count: countSemana },
                    mes: { total: totalMes, count: countMes },
                    pago: {
                        efectivo: { count: pagoEfectivo, total: totalEfectivo },
                        tarjeta: { count: pagoTarjeta, total: totalTarjeta },
                        spei: { count: pagoSPEI, total: totalSPEI }
                    }
                };
            };

            // Dynamic color token settings
            const sBgHeader = theme === 'dark' ? 'bg-slate-950/90 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-900 shadow-sm';
            const sBgCard = theme === 'dark' ? 'bg-slate-900 border-slate-800 text-slate-100' : 'bg-white border-slate-200 shadow-md text-slate-800';

                            <div>

                                </h1>

                            <button

                                title={theme === 'dark' ? 'Cambiar a Modo Claro' : 'Cambiar a Modo Oscuro'}

                            </button>

                                        <i className="fa-solid fa-power-off mr-1.5"></i> Salir

                                <span className={`px-2 font-bold ${sTextSec}`}><i className="fa-solid fa-store mr-1 text-amber-500"></i> Tiendas:</span>
                                <select

                                >

                    {/* Workspace Wrapper */}

                                    <BrandLogo className="w-16 h-16 rounded-full mx-auto mb-4" />
                                    <h2 className={`text-2xl font-black ${sTextPri}`}>Ingreso de Personal</h2>
                                    <p className={`text-xs ${sTextSec} mt-1`}>Ecosistema contable y logístico ZeloxCloud SaaS</p>
                                </div>

                                {loginError && (
                                    <div className="bg-red-500/10 border border-red-500/20 text-red-400 text-xs p-3 rounded-lg mb-6 flex items-center gap-2">
                                        <i className="fa-solid fa-triangle-exclamation"></i>
                                        <span>{loginError}</span>
                                    </div>
                                )}

                                <form onSubmit={handleLogin} className="space-y-4" autoComplete="off">

                                        <label className={`block text-xs font-semibold uppercase tracking-wider ${sTextSec} mb-2`}>Correo Electrónico</label>

                                            type="email" placeholder="Ingresa tu correo" value={loginEmail}

                                                                <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded flex items-center gap-1 shadow-lg ${merchant.Estado_Tienda === 'Cerrado' ? 'bg-red-600 text-white pulse-red' : 'bg-emerald-600 text-white pulse-green'}`}>
                                                                    <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                                                                    {merchant.Estado_Tienda === 'Cerrado' ? 'Cerrado' : 'Abierto'}
                                                                </span>
                                                            </div>
                                                            <h2 className="text-3xl font-black text-white">{merchant.Nombre}</h2>
                                                            <p className="text-xs text-slate-300">Horario: <span className="font-bold text-amber-500">{merchant.Horario || 'Abierto 24 Horas'}</span></p>
                                                        </div>
                                                        <p className="text-xs text-slate-300 font-bold bg-black/45 px-3 py-1.5 rounded-lg border border-white/10"><i className="fa-solid fa-phone mr-1.5"></i> {merchant.Telefono}</p>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {products.filter(p => p.ID_Comercio === merchant.ID_Comercio).length === 0 ? (
                                                        <p className="text-slate-500 italic py-8 col-span-2 text-center">Catálogo sin productos temporalmente.</p>
                                                    ) : (
                                                        products.filter(p => p.ID_Comercio === merchant.ID_Comercio).map(p => (
                                                            <div key={p.ID_Producto} className={`${sBgCard} border p-5 rounded-2xl transition flex flex-col justify-between`}>
                                                                <div className="space-y-2">
                                                                    <div className="flex justify-between items-start">
                                                                        <span className={`text-3xl p-2 rounded-xl border flex items-center justify-center w-14 h-14 overflow-hidden ${theme === 'light' ? 'bg-slate-100 border-slate-200' : 'bg-slate-950 border-slate-800'}`}>
                                                                            {isEmoji(p.Imagen) ? p.Imagen : <img src={p.Imagen} alt={p.Nombre_Producto} className="w-full h-full object-cover rounded" />}
                                                                        </span>
                                                                        <span className="bg-amber-500/10 text-amber-500 font-extrabold px-3 py-1 rounded-lg text-sm border border-amber-500/20">${p.Precio} MXN</span>
                                                                    </div>
                                                                    <h3 className={`font-bold text-base pt-2 ${sTextPri}`}>{p.Nombre_Producto}</h3>
                                                                    <p className={`text-xs ${sTextSec} line-clamp-3`}>{p.Descripcion}</p>
                                                                </div>
                                                                <button 
                                                                    onClick={() => {
                                                                        if (merchant.Estado_Tienda === "Cerrado") {
                                                                            showToast("⚠️ Este comercio está cerrado por el momento.");
                                                                            return;
                                                                        }
                                                                        addToCart(p);
                                                                    }} 
                                                                    className={`w-full mt-4 py-2 rounded-xl text-xs font-bold border transition ${theme === 'light' ? 'bg-white hover:bg-amber-500 hover:text-slate-955 border-slate-200 shadow-sm' : 'bg-slate-955 hover:bg-amber-500 hover:text-slate-955 border-slate-800'} ${merchant.Estado_Tienda === "Cerrado" ? "opacity-50 cursor-not-allowed" : ""}`}
                                                                >
                                                                    {merchant.Estado_Tienda === "Cerrado" ? "Establecimiento Cerrado" : "Agregar al Pedido"}
                                                                </button>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>

                                            {/* Shopping Cart pane */}
                                            <div className="space-y-6">
                                                <div className={`${sBgCard} p-6 rounded-2xl border space-y-4 sticky top-24 shadow-2xl`}>
                                                    <h3 className={`font-bold text-lg ${sTextPri} border-b ${sBorder} pb-3 flex justify-between items-center`}>
                                                        <span>Resumen de Compra</span>
                                                        <span className={`text-xs ${sTextSec}`}>({Object.values(cart).reduce((sum, i) => sum + i.qty, 0)} items)</span>
                                                    </h3>

                                                    {Object.keys(cart).length === 0 ? (
                                                        <p className="text-xs italic text-slate-500 text-center py-6">Carrito vacío.</p>
                                                    ) : (
                                                        <div className="divide-y divide-slate-800 max-h-48 overflow-y-auto pr-1">
                                                            {Object.values(cart).map(item => (
                                                                <div key={item.ID_Producto} className="py-2.5 flex justify-between items-center text-xs">
                                                                    <div>
                                                                        <p className={`font-bold ${sTextPri}`}>{item.Nombre_Producto}</p>
                                                                        <p className={`${sTextSec} text-[10px]`}>${item.Precio} x {item.qty}</p>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <button onClick={() => removeFromCart(item.ID_Producto)} className="text-slate-400 bg-slate-955 border border-slate-800 rounded p-1"><i className="fa-solid fa-minus"></i></button>
                                                                        <span className={`font-bold ${sTextPri}`}>{item.qty}</span>
                                                                        <button onClick={() => addToCart(item)} className="text-slate-400 bg-slate-955 border border-slate-800 rounded p-1"><i className="fa-solid fa-plus"></i></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {Object.keys(cart).length > 0 && (
                                                        <div className="space-y-4 pt-3 border-t border-slate-800 text-xs">
                                                            
                                                            {/* Intelligent consumer profile card (Uber/Didi style) */}
                                                            <div className={`p-4 rounded-xl border ${theme === 'light' ? 'bg-slate-50 border-slate-200' : 'bg-slate-955 border-slate-800'}`}>
                                                                <div className="flex justify-between items-center mb-2 border-b border-slate-800/40 pb-1.5">
                                                                    <span className="text-[9px] uppercase font-bold text-amber-500 tracking-wider flex items-center gap-1">
                                                                        <i className="fa-solid fa-circle-check"></i> Dirección Guardada
                                                                    </span>
                                                                    <button 
                                                                        type="button" 
                                                                        onClick={() => {
                                                                            setOnboardingForm({
                                                                                nombre: consumerProfile.nombre,
                                                                                telefono: consumerProfile.telefono,
                                                                                calle: consumerProfile.calle,
                                                                                numero: consumerProfile.numero,
                                                                                colonia: consumerProfile.colonia,
                                                                                municipio: consumerProfile.municipio
                                                                            });
                                                                            setConsumerProfile(null);
                                                                        }}
                                                                        className="text-[9px] text-amber-500 font-bold hover:underline"
                                                                    >
                                                                        <i className="fa-solid fa-pen-to-square"></i> Editar
                                                                    </button>
                                                                </div>
                                                                <p className={`font-bold text-xs ${sTextPri}`}>{consumerProfile.nombre}</p>
                                                                <p className={`text-[11px] ${sTextSec} mt-1 leading-relaxed`}>
                                                                    <i className="fa-solid fa-map-pin text-amber-500 mr-1.5"></i>
                                                                    {consumerProfile.calle} #{consumerProfile.numero}, Col. {consumerProfile.colonia}, {consumerProfile.municipio}
                                                                </p>
                                                                <p className={`text-[11px] ${sTextSec} mt-1`}>
                                                                    <i className="fa-solid fa-mobile-screen-button text-amber-500 mr-1.5"></i>
                                                                    {consumerProfile.telefono}
                                                                </p>
                                                            </div>

                                                            <div>
                                                                <label className={`block text-[10px] uppercase font-bold ${sTextSec} mb-1`}>Propina Repartidor</label>
                                                                <div className="grid grid-cols-4 gap-1">
                                                                    {[0, 5, 10, 15].map(p => (
                                                                        <button key={p} type="button" onClick={() => { setTipPercent(p); setCustomTip(''); }} className={`py-1 rounded border transition ${tipPercent === p ? 'bg-amber-500 text-slate-950' : 'bg-slate-950 text-slate-400 border-slate-800'}`}>{p}%</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            <div>
                                                                <label className={`block text-[10px] uppercase font-bold ${sTextSec} mb-1`}>Forma de Pago</label>
                                                                <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className={`w-full ${sBgInput} border rounded-xl px-3 py-2 focus:outline-none focus:border-amber-500 text-xs cursor-pointer`}>
                                                                    <option value="Efectivo" className={sOptionBg}>Efectivo</option>
                                                                    <option value="Tarjeta de Débito/Crédito" className={sOptionBg}>Tarjeta de Débito/Crédito</option>
                                                                    <option value="Transferencia SPEI" className={sOptionBg}>Transferencia SPEI</option>
                                                                </select>
                                                                {paymentMethod === "Efectivo" && (
                                                                    <input type="number" placeholder="¿Con cuánto vas a pagar?" value={cashAmount} onChange={(e) => setCashAmount(e.target.value)} className={`w-full mt-2 ${sBgInput} border rounded-xl px-3 py-1.5 text-xs focus:outline-none`} required />
                                                                )}
                                                            </div>

                                                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-2 font-mono text-[11px] text-slate-400">
                                                                <div className="flex justify-between"><span>Subtotal:</span><span>${cartTotal.toFixed(2)}</span></div>
                                                                <div className="flex justify-between"><span>Envío:</span><span>${deliveryFee.toFixed(2)}</span></div>
                                                                <div className="flex justify-between"><span>Propina:</span><span>${currentTipVal.toFixed(2)}</span></div>
                                                                <div className="flex justify-between border-t border-slate-800 pt-2 font-bold text-white text-xs"><span>Total:</span><span className="text-amber-500">${finalTotal.toFixed(2)} MXN</span></div>
                                                            </div>

                                                            <button 
                                                                type="button" 
                                                                onClick={() => handlePlaceOrder(merchant)} 
                                                                disabled={merchant.Estado_Tienda === "Cerrado"}
                                                                className={`w-full py-3 rounded-xl font-black ${merchant.Estado_Tienda === "Cerrado" ? "bg-slate-800 text-slate-500 cursor-not-allowed" : "bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-950 shadow-lg"}`}
                                                            >
                                                                {merchant.Estado_Tienda === "Cerrado" ? "Tienda Cerrada Temporalmente" : "Confirmar Pedido Digital"}
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* Modals */}
                        {orderConfirmedModal && lastPlacedOrder && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-955/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="bg-slate-955/40 p-6 text-center border-b border-slate-800">
                                        <div className="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl"><i className="fa-solid fa-circle-check"></i></div>
                                        <h3 className="text-xl font-black text-white">¡Pedido Enviado!</h3>
                                    </div>
                                    <div className="p-6 space-y-4 text-xs font-mono text-slate-300">
                                        <div className="flex justify-between"><span>ID Orden:</span><span className="font-bold text-amber-500">{lastPlacedOrder.ID_Orden}</span></div>
                                        <div className="flex justify-between"><span>Total:</span><span className="text-slate-200">${lastPlacedOrder.Total} MXN</span></div>
                                        <div className="flex justify-between"><span>Cliente:</span><span className="text-slate-200">{lastPlacedOrder.Cliente}</span></div>
                                        <div className="flex justify-between"><span>Teléfono:</span><span className="text-slate-200">{lastPlacedOrder.Telefono}</span></div>
                                    </div>
                                    <div className="p-6 bg-slate-900/40 border-t border-slate-800">
                                        <button onClick={() => setOrderConfirmedModal(false)} className="w-full bg-slate-800 text-slate-300 py-3 rounded-xl font-bold">Aceptar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* UI Custom Dialog (Alert Modals) */}
                        {customAlert.show && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-955/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="p-6 border-b border-slate-800 bg-slate-900/40 flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-amber-500/10 text-amber-500 flex items-center justify-center border border-amber-500/20 text-lg">
                                            <i className="fa-solid fa-circle-info"></i>
                                        </div>
                                        <h3 className="font-black text-base text-white">{customAlert.title}</h3>
                                    </div>
                                    <div className="p-6">
                                        <p className="text-slate-300 text-sm leading-relaxed">{customAlert.message}</p>
                                    </div>
                                    <div className="p-6 bg-slate-900/40 border-t border-slate-800 text-right">
                                        <button 
                                            onClick={() => setCustomAlert({ show: false, title: '', message: '' })}
                                            className="bg-amber-500 hover:bg-amber-600 text-slate-955 font-extrabold px-6 py-2 rounded-xl text-xs transition shadow"
                                        >
                                            Entendido
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* UI Custom Confirm */}
                        {customConfirm.show && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-955/85 backdrop-blur-sm">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl relative">
                                    <div className="p-6 border-b border-slate-800 bg-slate-900/40 flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-red-500/10 text-red-400 flex items-center justify-center border border-red-500/20 text-lg">
                                            <i className="fa-solid fa-triangle-exclamation"></i>
                                        </div>
                                        <h3 className="font-black text-base text-white">{customConfirm.title}</h3>
                                    </div>
                                    <div className="p-6">
                                        <p className="text-slate-300 text-sm leading-relaxed">{customConfirm.message}</p>
                                    </div>
                                    <div className="p-6 bg-slate-900/40 border-t border-slate-800 flex justify-end gap-3 text-right">
                                        <button 
                                            onClick={() => setCustomConfirm({ show: false, title: '', message: '', onConfirm: null })}
                                            className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-5 py-2 rounded-xl text-xs transition"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={() => {
                                                if (customConfirm.onConfirm) customConfirm.onConfirm();
                                                setCustomConfirm({ show: false, title: '', message: '', onConfirm: null });
                                            }}
                                            className="bg-red-500 hover:bg-red-600 text-white font-extrabold px-6 py-2 rounded-xl text-xs transition shadow"
                                        >
                                            Confirmar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Master Footer */}
                    <footer className={`border-t py-6 text-center text-xs relative z-10 transition-colors duration-200 ${theme === 'light' ? 'bg-slate-100 border-slate-200 text-slate-500' : 'bg-slate-950 border-slate-900 text-slate-500'}`}>
                        <p>© 2026 ZeloxCloud Local Hub. Una solución de automatización inteligente de Grupo DFC.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZeloxCloudApp />);
    </script>
</body>
</html>
